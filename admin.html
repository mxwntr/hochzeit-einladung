<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästeliste - Max & Nadja</title>
    <link rel="icon" type="image/webp" href="icon.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f7;
            --paper-white: #ffffff;
            --black: #111111;
            --border-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--black);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-align: center;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            background: var(--paper-white);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f0f0f0;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 600;
            color: var(--black);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            background: #fafafa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .status-accepted {
            background-color: #d4edda;
            color: #155724;
        }

        .status-declined {
            background-color: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* --- Passwort-Schutz Styles --- */
        .hidden {
            display: none !important;
        }

        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--paper-white);
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            text-align: center;
            width: min(85vw, 320px);
        }

        .login-box h2 {
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            font-family: inherit;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
            font-family: inherit;
            font-weight: 500;
        }

        .login-box button:hover {
            background: #333;
        }

        #error-msg {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 500;
        }

        /* --- Generator Styles --- */
        .generator-card {
            width: 100%;
            max-width: 800px;
            background: var(--paper-white);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            padding: 30px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .generator-card h2 {
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .generator-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .generator-form input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        .generator-form button {
            padding: 12px 25px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            transition: background 0.3s;
            font-family: inherit;
        }

        .generator-form button:hover {
            background: #333;
        }

        .result-box {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 4px;
            border: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .result-box button {
            background: none;
            border: 1px solid var(--black);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            transition: all 0.3s;
            flex-shrink: 0;
            margin-left: 15px;
            font-family: inherit;
        }

        .result-box button:hover {
            background: var(--black);
            color: white;
        }

        @media (max-width: 600px) {
            .generator-form {
                flex-direction: column;
            }
            .result-box {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .result-box button {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Passwort-Abfrage Overlay -->
    <div id="password-screen">
        <div class="login-box">
            <h2>Bereich geschützt</h2>
            <input type="password" id="password-input" placeholder="Passwort eingeben" onkeydown="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()">Anmelden</button>
            <div id="error-msg" class="hidden">Falsches Passwort!</div>
        </div>
    </div>

    <!-- Haupt-Dashboard (wird erst nach richtigem Passwort sichtbar) -->
    <div id="admin-content" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1>Gästeliste Übersicht</h1>

        <!-- Einladungs-Link Generator -->
        <div class="generator-card">
            <h2>Link Generator</h2>
            <div class="generator-form">
                <!-- Zeile 1: Name(n) Eingabefelder -->
                <div style="width: 100%;">
                    <!-- Einzelgast Feld -->
                    <input type="text" id="guest-name-input" placeholder="Name des Gasts (z.B. Oma & Opa oder Familie Schmidt)" onkeydown="if(event.key === 'Enter') generateLink()">
                    
                    <!-- Paargast Felder (standardmäßig versteckt) -->
                    <div id="couple-names-inputs" class="hidden" style="display: none; gap: 15px; width: 100%;">
                        <input type="text" id="guest-name1-input" placeholder="Name Person 1 (z.B. Erika)" style="flex: 1; min-width: 0;">
                        <input type="text" id="guest-name2-input" placeholder="Name Person 2 (z.B. Max)" style="flex: 1; min-width: 0;">
                    </div>
                </div>
                
                <!-- Zeile 2: Checkbox & Button Bar -->
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; width: 100%;">
                    <div style="display: flex; align-items: center; gap: 8px; user-select: none;">
                        <input type="checkbox" id="is-couple-checkbox" onchange="toggleLinkGeneratorInputs()" style="width: 18px; height: 18px; margin: 0; cursor: pointer;">
                        <label for="is-couple-checkbox" style="font-size: 0.9rem; cursor: pointer; color: #444; font-weight: 500;">2 Personen (Paar) einladen</label>
                    </div>
                    <button onclick="generateLink()" style="padding: 12px 25px; min-width: 180px;">Link erstellen</button>
                </div>
            </div>
            <div id="result-wrapper" class="hidden">
                <div class="result-box">
                    <span id="generated-link-text"></span>
                    <button onclick="copyGeneratedLink()" id="copy-btn">Kopieren</button>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="count-total">0</div>
                    <div class="stat-label">Antworten</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-accepted" style="color: #155724;">0</div>
                    <div class="stat-label">Zusagen</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-declined" style="color: #721c24;">0</div>
                    <div class="stat-label">Absagen</div>
                </div>
            </div>
            
            <div class="stats" style="border-top: 1px solid var(--border-color); background: #fafafa; padding: 15px 20px;">
                <div class="stat-box">
                    <div class="stat-number" id="count-tagliata" style="font-size: 1.3rem;">0</div>
                    <div class="stat-label" style="font-size: 0.65rem;">Tagliata</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-tagliatelle" style="font-size: 1.3rem;">0</div>
                    <div class="stat-label" style="font-size: 0.65rem;">Tagliatelle Bologn.</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-pizza" style="font-size: 1.3rem;">0</div>
                    <div class="stat-label" style="font-size: 0.65rem;">Pizza Venezia</div>
                </div>
            </div>
 
            <div style="width: 100%; overflow-x: auto;">
                <table style="width: 100%; min-width: 650px; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="min-width: 120px; width: 25%;">Name</th>
                            <th style="min-width: 130px; width: 20%;">Status</th>
                            <th style="min-width: 250px; width: 35%;">Hauptgang</th>
                            <th style="min-width: 150px; width: 20%;">Datum</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="4" class="loading">Lade Daten aus Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Passwort-Prüfung Script -->
    <script>
        const CORRECT_PASSWORD = "NadjaMax2026"; // Ändere dieses Passwort wie du möchtest!

        function checkPassword() {
            const passwordInput = document.getElementById("password-input");
            const errorMsg = document.getElementById("error-msg");
            const passwordScreen = document.getElementById("password-screen");
            const adminContent = document.getElementById("admin-content");

            if (passwordInput.value === CORRECT_PASSWORD) {
                sessionStorage.setItem("admin_auth", "true");
                passwordScreen.classList.add("hidden");
                adminContent.classList.remove("hidden");
            } else {
                errorMsg.classList.remove("hidden");
                passwordInput.value = "";
            }
        }

        // Link Generator Funktionen
        function toggleLinkGeneratorInputs() {
            const isCouple = document.getElementById("is-couple-checkbox").checked;
            const singleInput = document.getElementById("guest-name-input");
            const coupleInputs = document.getElementById("couple-names-inputs");
            
            if (isCouple) {
                singleInput.classList.add("hidden");
                coupleInputs.classList.remove("hidden");
                coupleInputs.style.display = "flex";
            } else {
                singleInput.classList.remove("hidden");
                coupleInputs.classList.add("hidden");
                coupleInputs.style.display = "none";
            }
        }

        function generateLink() {
            const isCouple = document.getElementById("is-couple-checkbox").checked;
            const resultWrapper = document.getElementById("result-wrapper");
            const linkText = document.getElementById("generated-link-text");
            const copyBtn = document.getElementById("copy-btn");

            // URL ermitteln
            const currentUrl = window.location.href;
            // admin.html abschneiden, um auf index.html zu linken
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/')) + '/';
            let fullLink = "";

            if (isCouple) {
                const name1 = document.getElementById("guest-name1-input").value.trim();
                const name2 = document.getElementById("guest-name2-input").value.trim();
                if (!name1 || !name2) {
                    alert("Bitte gib beide Namen ein!");
                    return;
                }
                fullLink = `${baseUrl}?name1=${encodeURIComponent(name1)}&name2=${encodeURIComponent(name2)}&guests=2`;
            } else {
                const name = document.getElementById("guest-name-input").value.trim();
                if (!name) {
                    alert("Bitte gib einen Namen ein!");
                    return;
                }
                fullLink = `${baseUrl}?name=${encodeURIComponent(name)}`;
            }

            linkText.textContent = fullLink;
            copyBtn.textContent = "Kopieren";
            resultWrapper.classList.remove("hidden");
        }

        function copyGeneratedLink() {
            const linkText = document.getElementById("generated-link-text").textContent;
            const copyBtn = document.getElementById("copy-btn");

            navigator.clipboard.writeText(linkText).then(() => {
                copyBtn.textContent = "Kopiert!";
            }).catch(err => {
                console.error("Fehler beim Kopieren:", err);
            });
        }

        // Session prüfen
        document.addEventListener("DOMContentLoaded", () => {
            if (sessionStorage.getItem("admin_auth") === "true") {
                document.getElementById("password-screen").classList.add("hidden");
                document.getElementById("admin-content").classList.remove("hidden");
            }
        });
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Deine Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyCP8G5ffseyRk-8LlzuEqfY0gzyKYQnmxU",
            authDomain: "hochzeit-aafd5.firebaseapp.com",
            projectId: "hochzeit-aafd5",
            storageBucket: "hochzeit-aafd5.firebasestorage.app",
            messagingSenderId: "898718029169",
            appId: "1:898718029169:web:df7f4727fd20e11fbe92d0",
            measurementId: "G-R70YD527CW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Echtzeit-Verbindung zur Datenbank (Live-Updates!)
        const q = query(collection(db, "rsvps"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = ""; // Tabelle leeren

            let total = 0;
            let accepted = 0;
            let declined = 0;
            let tagliata = 0;
            let tagliatelle = 0;
            let pizza = 0;

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="loading">Noch keine Antworten erhalten.</td></tr>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                total++;

                // Zeile erstellen
                const tr = document.createElement("tr");

                // Name
                const tdName = document.createElement("td");
                if (data.status === "accepted" && data.attendingNames && data.attendingNames !== data.name) {
                    tdName.textContent = `${data.name} (${data.attendingNames} kommt)`;
                } else {
                    tdName.textContent = data.name || "Unbekannt";
                }
                tr.appendChild(tdName);

                // Status
                const tdStatus = document.createElement("td");
                const badge = document.createElement("span");
                badge.classList.add("status-badge");
                if (data.status === "accepted") {
                    const count = data.guestsCount !== undefined ? data.guestsCount : 1;
                    badge.textContent = count > 1 ? `Zusage (${count} Pers.)` : "Zusage";
                    badge.classList.add("status-accepted");
                    accepted += count;
                    
                    // Essenswunsch per Regex zählen (falls kombiniert wie "Tagliata & Pizza Venezia")
                    if (data.meal) {
                        tagliata += (data.meal.match(/Tagliata|Rinderfilet/g) || []).length;
                        tagliatelle += (data.meal.match(/Tagliatelle Bolognese|Lachsfilet/g) || []).length;
                        pizza += (data.meal.match(/Pizza Venezia|Vegetarisch/g) || []).length;
                    }
                } else {
                    const count = data.guestsCount !== undefined ? data.guestsCount : 1;
                    badge.textContent = count > 1 ? `Absage (${count} Pers.)` : "Absage";
                    badge.classList.add("status-declined");
                    declined += count;
                }
                tdStatus.appendChild(badge);
                tr.appendChild(tdStatus);

                // Hauptgang
                const tdMeal = document.createElement("td");
                if (data.status === "accepted" && data.meal) {
                    if (data.meal.includes(" | ")) {
                        tdMeal.innerHTML = data.meal.split(" | ").map(item => `<div style="margin-bottom: 4px; line-height: 1.3;">${item}</div>`).join("");
                    } else {
                        tdMeal.textContent = data.meal;
                    }
                } else {
                    tdMeal.textContent = data.status === "accepted" ? "Nicht gewählt" : "-";
                }
                tr.appendChild(tdMeal);

                // Datum
                const tdDate = document.createElement("td");
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    tdDate.textContent = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' Uhr';
                } else {
                    tdDate.textContent = "Gerade eben";
                }
                tr.appendChild(tdDate);

                tbody.appendChild(tr);
            });

            // Zähler aktualisieren
            document.getElementById("count-total").textContent = total;
            document.getElementById("count-accepted").textContent = accepted;
            document.getElementById("count-declined").textContent = declined;
            document.getElementById("count-tagliata").textContent = tagliata;
            document.getElementById("count-tagliatelle").textContent = tagliatelle;
            document.getElementById("count-pizza").textContent = pizza;
        }, (error) => {
            console.error("Fehler beim Laden:", error);
            document.getElementById("table-body").innerHTML = '<tr><td colspan="4" class="loading" style="color:red;">Fehler: Konnte nicht geladen werden.</td></tr>';
        });

    </script>
</body>

</html>
