<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästeliste - Max & Nadja</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f7;
            --paper-white: #ffffff;
            --black: #111111;
            --border-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--black);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-align: center;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            background: var(--paper-white);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f0f0f0;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 600;
            color: var(--black);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            background: #fafafa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-accepted {
            background-color: #d4edda;
            color: #155724;
        }

        .status-declined {
            background-color: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* --- Passwort-Schutz Styles --- */
        .hidden {
            display: none !important;
        }

        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--paper-white);
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            text-align: center;
            width: min(85vw, 320px);
        }

        .login-box h2 {
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            font-family: inherit;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
            font-family: inherit;
            font-weight: 500;
        }

        .login-box button:hover {
            background: #333;
        }

        #error-msg {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- Passwort-Abfrage Overlay -->
    <div id="password-screen">
        <div class="login-box">
            <h2>Bereich geschützt</h2>
            <input type="password" id="password-input" placeholder="Passwort eingeben" onkeydown="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()">Anmelden</button>
            <div id="error-msg" class="hidden">Falsches Passwort!</div>
        </div>
    </div>

    <!-- Haupt-Dashboard (wird erst nach richtigem Passwort sichtbar) -->
    <div id="admin-content" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1>Gästeliste Übersicht</h1>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="count-total">0</div>
                    <div class="stat-label">Antworten</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-accepted" style="color: #155724;">0</div>
                    <div class="stat-label">Zusagen</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="count-declined" style="color: #721c24;">0</div>
                    <div class="stat-label">Absagen</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Datum</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="3" class="loading">Lade Daten aus Firebase...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Passwort-Prüfung Script -->
    <script>
        const CORRECT_PASSWORD = "NadjaMax2026"; // Ändere dieses Passwort wie du möchtest!

        function checkPassword() {
            const passwordInput = document.getElementById("password-input");
            const errorMsg = document.getElementById("error-msg");
            const passwordScreen = document.getElementById("password-screen");
            const adminContent = document.getElementById("admin-content");

            if (passwordInput.value === CORRECT_PASSWORD) {
                sessionStorage.setItem("admin_auth", "true");
                passwordScreen.classList.add("hidden");
                adminContent.classList.remove("hidden");
            } else {
                errorMsg.classList.remove("hidden");
                passwordInput.value = "";
            }
        }

        // Session prüfen
        document.addEventListener("DOMContentLoaded", () => {
            if (sessionStorage.getItem("admin_auth") === "true") {
                document.getElementById("password-screen").classList.add("hidden");
                document.getElementById("admin-content").classList.remove("hidden");
            }
        });
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Deine Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyCP8G5ffseyRk-8LlzuEqfY0gzyKYQnmxU",
            authDomain: "hochzeit-aafd5.firebaseapp.com",
            projectId: "hochzeit-aafd5",
            storageBucket: "hochzeit-aafd5.firebasestorage.app",
            messagingSenderId: "898718029169",
            appId: "1:898718029169:web:df7f4727fd20e11fbe92d0",
            measurementId: "G-R70YD527CW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Echtzeit-Verbindung zur Datenbank (Live-Updates!)
        const q = query(collection(db, "rsvps"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = ""; // Tabelle leeren

            let total = 0;
            let accepted = 0;
            let declined = 0;

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="3" class="loading">Noch keine Antworten erhalten.</td></tr>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                total++;

                // Zeile erstellen
                const tr = document.createElement("tr");

                // Name
                const tdName = document.createElement("td");
                tdName.textContent = data.name || "Unbekannt";
                tr.appendChild(tdName);

                // Status
                const tdStatus = document.createElement("td");
                const badge = document.createElement("span");
                badge.classList.add("status-badge");
                if (data.status === "accepted") {
                    badge.textContent = "Zusage";
                    badge.classList.add("status-accepted");
                    accepted++;
                } else {
                    badge.textContent = "Absage";
                    badge.classList.add("status-declined");
                    declined++;
                }
                tdStatus.appendChild(badge);
                tr.appendChild(tdStatus);

                // Datum
                const tdDate = document.createElement("td");
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    tdDate.textContent = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' Uhr';
                } else {
                    tdDate.textContent = "Gerade eben";
                }
                tr.appendChild(tdDate);

                tbody.appendChild(tr);
            });

            // Zähler aktualisieren
            document.getElementById("count-total").textContent = total;
            document.getElementById("count-accepted").textContent = accepted;
            document.getElementById("count-declined").textContent = declined;
        }, (error) => {
            console.error("Fehler beim Laden:", error);
            document.getElementById("table-body").innerHTML = '<tr><td colspan="3" class="loading" style="color:red;">Fehler: Konnte nicht geladen werden.</td></tr>';
        });

    </script>
</body>

</html>
