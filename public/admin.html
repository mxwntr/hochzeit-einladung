<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hochzeitsgäste</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f7f7;
            color: #111;
            padding: 40px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        table {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #111;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .status-accepted { color: green; font-weight: 600; }
        .status-declined { color: red; font-weight: 600; }
        .status-pending { color: #888; font-style: italic; }
        .generate-link {
            max-width: 800px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        button {
            padding: 10px 20px;
            background: #111;
            color: #fff;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: #333;
        }
        #generated-link {
            display: block;
            margin-top: 10px;
            word-break: break-all;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>Gästeliste & Status</h1>

    <div class="generate-link">
        <div style="width: 100%;">
            <h3 style="margin-bottom: 10px; font-size: 1rem;">Persönlichen Einladungslink erstellen</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="guest-name-input" placeholder="Name des Gastes (z.B. Max Mustermann)">
                <button onclick="generateLink()">Link generieren</button>
            </div>
            <a id="generated-link" href="#" target="_blank"></a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Geöffnet</th>
                <th>Antwort</th>
            </tr>
        </thead>
        <tbody id="guests-tbody">
            <!-- Guests will be populated here -->
        </tbody>
    </table>

    <script src="admin.js"></script>
</body>
</html>
