<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hochzeitseinladung - Max & Nadja</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Montserrat:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">

    <!-- Cache-Buster hinzugefügt (?v=3) damit Handys das neue CSS laden! -->
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/02/10/audio_f823e2fb7c.mp3?filename=piano-moment-9835.mp3" type="audio/mpeg">
    </audio>

    <!-- LANDING SCREEN (Umschlag mit Wachssiegel) -->
    <div id="landing-screen" class="screen active">
        <div class="envelope-container" id="envelope-wrapper">
            <div class="envelope-3d">
                <div class="envelope-inner-card"></div>
                <div class="flap left"></div>
                <div class="flap right"></div>
                <div class="flap bottom"></div>
                <div class="flap top" id="flap">
                    <!-- Wax Seal: Eigenes Bild mit Initialen -->
                    <div class="wax-seal" id="wax-seal">
                        <!-- Lege dein Siegel-Bild als images/siegel.webp ab! -->
                        <img src="images/siegel.webp" alt="Wachssiegel" class="seal-img">
                        <span class="seal-initial">M<span class="seal-amp">&</span>N</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="click-hint">
            <span class="script-text-small">Zum Öffnen klicken...</span>
        </div>
    </div>

    <!-- MAIN CONTENT SCREEN -->
    <div id="content-screen" class="screen hidden">
        <div class="invitation-scroll">

            <!-- Sektion 1: Umschlag mit Paar-Foto -->
            <section class="section envelope-photo-section">
                <div class="photo-envelope">
                    <div class="photo-envelope-back"></div>
                    <div class="photo-envelope-image">
                        <!-- Lege euer Foto als images/paar.webp ab! -->
                        <img src="images/paar.webp" alt="Max & Nadja"
                            onerror="this.src='https://images.unsplash.com/photo-1529634597503-139d3726fed5?auto=format&fit=crop&w=600&q=80'; this.style.filter='grayscale(100%)'">
                    </div>
                    <div class="photo-envelope-flap"></div>
                </div>
                <!-- Deko-Blume -->
                <img src="images/07.webp" class="deco-flower deco-flower-1" alt="">
            </section>

            <!-- Sektion 2: Schallplatte -->
            <section class="section vinyl-section">
                <div class="vinyl-record" id="vinyl-btn">
                    <div class="vinyl-grooves"></div>
                    <div class="vinyl-label">
                        <span class="vinyl-text">ZUM HÖREN<br>KLICKEN</span>
                        <div class="play-btn">▶</div>
                    </div>
                </div>
            </section>

            <!-- Sektion 3: Namens-Karte (Bogen) -->
            <section class="section names-section">
                <img src="images/08.webp" class="deco-flower deco-flower-2" alt="">
                <div class="arch-card">
                    <div class="arch-content">
                        <p class="arch-subtitle">WIR LADEN EUCH HERZLICH EIN<br>ZUR HOCHZEIT VON</p>
                        <h1 class="arch-names">Max<br><span class="and">&</span><br>Nadja</h1>
                        <p id="guest-name-display" class="guest-name"></p>
                    </div>
                </div>
            </section>

            <!-- Sektion 4: Datum & Location -->
            <section class="section date-section">
                <div class="date-card">
                    <div class="inner-border">
                        <div class="date-number">26</div>
                        <div class="date-month">August</div>
                        <div class="date-year">2026</div>
                        <div class="divider"></div>
                        <div class="date-details">
                            UM 10 UHR<br>
                            STANDESAMT RATINGEN<br><br>
                            ANSCHLIESSEND<br>
                            RESTAURANTE MILANO<br>
                            RATINGEN LINTORF
                        </div>
                    </div>
                </div>
                <img src="images/04.webp" class="deco-flower deco-flower-3" alt="">
            </section>

            <!-- Sektion 5: Monogramm -->
            <section class="section monogram-section">
                <div class="monogram-oval">
                    <div class="oval-inner">
                        <span class="monogram-letters">M  N</span>
                    </div>
                </div>
            </section>

            <!-- Sektion 6: RSVP -->
            <section class="section rsvp-section-wrapper">
                <div class="rsvp-card">
                    <div class="rsvp-seal">M&N</div>
                    <p class="rsvp-title">Um Antwort</p>
                    <p class="rsvp-script">wird gebeten</p>
                    <div class="rsvp-buttons" id="rsvp-buttons">
                        <button onclick="submitRSVP('accepted')">Zusagen</button>
                        <button onclick="submitRSVP('declined')">Absagen</button>
                    </div>
                    <p id="response-msg" class="response-msg hidden"></p>
                </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
                <p>MIT LIEBE & DANKBARKEIT</p>
                <p class="footer-names">Max & Nadja</p>
            </footer>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
